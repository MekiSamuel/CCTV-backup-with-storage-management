# ============================================================
#  CCTV Backup - configuration TEMPLATE
#
#  Copy this file to  config.ini  and fill in your real values.
#  (setup.ps1 does this automatically if config.ini is missing.)
#  config.ini is git-ignored so your camera password is never pushed.
# ============================================================

[storage]
# Where recordings are saved. IMPORTANT: keep this OUT of OneDrive /
# Dropbox / any synced folder, or it will try to upload gigabytes of video.
backup_dir = C:\Users\YOURNAME\CCTV-Backup

# Hard ceiling for the whole backup folder. When exceeded, the OLDEST
# files are deleted until the folder is back under this size.
max_size_gb = 10

# Anything older than this many days is deleted, regardless of size.
# 3 weeks = 21 days.
retention_days = 21

# How long each recorded clip is, in seconds. 600 = 10-minute files.
segment_seconds = 600

# How often (seconds) the cleanup check runs while the service is up.
cleanup_interval_seconds = 300

# Container/extension for clips.
#   mkv = recommended: holds H.264/H.265 + G.711 audio as-is, and a clip
#         stays playable even if recording is interrupted (no moov atom).
#   mp4 = widest player support, but a clip is only playable once it closes
#         cleanly (an interrupted/in-progress clip is unplayable). Audio is
#         re-encoded to AAC for mp4.
#   ts  = streaming container, also interruption-safe.
segment_format = mkv


# ------------------------------------------------------------
#  Cameras. Add one [camera:xxx] block per camera.
#  - name : used as the sub-folder name under backup_dir
#  - url  : the RTSP URL from your camera/NVR
#
#  Remember to URL-encode special characters in the password
#  (e.g. @ becomes %40).
#
#  Hikvision channel/stream paths are 3-digit <channel><stream>:
#    /Streaming/Channels/101  = camera 1, MAIN stream (full quality)
#    /Streaming/Channels/102  = camera 1, SUB stream (low bitrate - lighter
#                               on bandwidth/storage; good for remote use)
#
#  Common RTSP URL formats (replace user/pass/IP):
#    Hikvision : rtsp://user:pass@192.168.1.13:554/Streaming/Channels/101
#    Dahua     : rtsp://user:pass@192.168.1.13:554/cam/realmonitor?channel=1&subtype=0
#    Reolink   : rtsp://user:pass@192.168.1.13:554/h264Preview_01_main
#    Amcrest   : rtsp://user:pass@192.168.1.13:554/cam/realmonitor?channel=1&subtype=0
#    Generic   : rtsp://user:pass@192.168.1.13:554/stream1
# ------------------------------------------------------------

# REMOTE EDITION: this off-site PC reaches the DVR over Tailscale.
# Keep using the DVR's LAN address (192.168.1.13) - Tailscale's subnet
# route makes it reachable from anywhere. Do NOT use the public IP here.
# See REMOTE-ACCESS.md for the one-time Tailscale setup.
# IMPORTANT (DS-7204HGHI-M1): use the /Streaming/tracks/101 endpoint.
# The /Streaming/Channels/101 (and /102) endpoints on this DVR emit a
# malformed bitstream ffmpeg can't decode (illegal POC / corrupt frames);
# the tracks/ endpoint serves a clean stream. tracks/<channel><stream>:
# 101 = ch1 main, 201 = ch2 main, etc.
[camera:cam1]
name = camera1
url = rtsp://USERNAME:PASSWORD@192.168.1.13:554/Streaming/tracks/101

# More cameras = more DVR channels. tracks/<channel>01 = main stream.
# WARNING: this DVR returns "453 Not Enough Bandwidth" if asked for too many
# concurrent streams (it can't serve several MAIN streams at once). If a camera
# fails with 453, use its SUB stream instead: last digit 1 -> 2 (tracks/202,
# tracks/302, ...). Sub streams are lower bitrate and fit the DVR's budget.
[camera:cam2]
name = camera2
url = rtsp://USERNAME:PASSWORD@192.168.1.13:554/Streaming/tracks/201

[camera:cam3]
name = camera3
url = rtsp://USERNAME:PASSWORD@192.168.1.13:554/Streaming/tracks/301
