# ============================================================
#  CCTV Backup - configuration TEMPLATE
#
#  Copy this file to  config.ini  and fill in your real values.
#  (setup.ps1 does this automatically if config.ini is missing.)
#  config.ini is git-ignored so your camera password is never pushed.
# ============================================================

[storage]
# Where recordings are saved. IMPORTANT: keep this OUT of OneDrive /
# Dropbox / any synced folder, or it will try to upload gigabytes of video.
backup_dir = C:\Users\YOURNAME\CCTV-Backup

# Hard ceiling for the whole backup folder. When exceeded, the OLDEST
# files are deleted until the folder is back under this size.
max_size_gb = 10

# Anything older than this many days is deleted, regardless of size.
# 3 weeks = 21 days.
retention_days = 21

# How long each recorded clip is, in seconds. 600 = 10-minute files.
segment_seconds = 600

# How often (seconds) the cleanup check runs while the service is up.
cleanup_interval_seconds = 300

# Container/extension for clips. mp4 = best compatibility.
# mkv = more crash-resilient (a clip stays playable if the PC loses power
# mid-recording). Change to mkv if power cuts are a concern.
segment_format = mp4


# ------------------------------------------------------------
#  Cameras. Add one [camera:xxx] block per camera.
#  - name : used as the sub-folder name under backup_dir
#  - url  : the RTSP URL from your camera/NVR
#
#  Remember to URL-encode special characters in the password
#  (e.g. @ becomes %40).
#
#  Hikvision channel/stream paths are 3-digit <channel><stream>:
#    /Streaming/Channels/101  = camera 1, MAIN stream (full quality)
#    /Streaming/Channels/102  = camera 1, SUB stream (low bitrate)
#
#  Common RTSP URL formats (replace user/pass/IP):
#    Hikvision : rtsp://user:pass@192.168.1.10:554/Streaming/Channels/101
#    Dahua     : rtsp://user:pass@192.168.1.10:554/cam/realmonitor?channel=1&subtype=0
#    Reolink   : rtsp://user:pass@192.168.1.10:554/h264Preview_01_main
#    Amcrest   : rtsp://user:pass@192.168.1.10:554/cam/realmonitor?channel=1&subtype=0
#    Generic   : rtsp://user:pass@192.168.1.10:554/stream1
# ------------------------------------------------------------

[camera:cam1]
name = camera1
url = rtsp://USERNAME:PASSWORD@192.168.1.10:554/Streaming/Channels/101

# To add a second camera, uncomment and edit:
# [camera:cam2]
# name = camera2
# url = rtsp://USERNAME:PASSWORD@192.168.1.11:554/Streaming/Channels/101
